logging:
  level: INFO

# Pipeline: DataCrawler → JDAnalyser → CanonicalDataCleaner → DataFactory
#
# JDAnalyser reads the canonical taxonomy for dedup, and writes
# approved-review output as a separate canonical-like JSON artifact.

taxonomy:
  # Source of truth for dedup — the cleaner's input file
  canonical_data: /mnt/workspace/CareerNavigator/DataFactory/data/input/taxonomy/canonical_data.json

soft_skill_taxonomy:
  path: input/Taxonomy/soft_skill_taxonomy.json
  queue_path: data/discovery/soft_skills_queue.json
  status_output_dir: data/discovery/soft_skills_statuses
  # Entries longer than this are likely full sentences, not skill names
  max_name_chars: 60
  # Entries with more words than this are filtered out
  max_name_words: 6

verb_taxonomy:
  path: input/Taxonomy/verb-taxonomy.json
  queue_path: data/discovery/verb_occurrences.json
  status_output_dir: data/discovery/verb_statuses

# Crawler input — --discover with no path uses input_dir by default
crawler:
  input_dir: input/Builtin
  default_jsonl: /mnt/workspace/DataCrawler/builtin_jobs_scraper/output/2026-02-25/builtin_structured_jobs.jsonl

# Discovery queue settings
discovery:
  queue_path: data/discovery/discovery_queue.json
  status_output_dir: data/discovery/statuses
  review_output: data/discovery/review_candidates.json
  approved_output: data/discovery/approved_canonical_output.json
  promotion_threshold: 5
  fuzzy_threshold: 0.85
  max_sample_sources: 10
  audit_dir: data/discovery/audit

# Local LLM via llama-server (OpenAI-compatible API)
llm:
  base_url: http://localhost:8080/v1
  model: Qwen3.5-35B-A3B-Q5_K_S.gguf
  temperature: 0.1
  max_tokens: 8192
  batch_size: 1

# Local embedding model via llama-server
embedding:
  base_url: http://127.0.0.1:8090
  model: nomic-embed-text-v1.5
  batch_size: 100
  threshold: 0.85

# Agent output directory
agents:
  output_dir: data/agents
